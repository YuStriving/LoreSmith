server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/ainovel?sslmode=disable&TimeZone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:ainovel}
    password: ${SPRING_DATASOURCE_PASSWORD:ainovel}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

ainovel:
  config-path: ${AINOVEL_CONFIG:dev_config.json}
